<!DOCTYPE html>
<html>
<head>
    <title>AI Surveillance</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            margin-top: 20px;
            font-size: 32px;
        }

        .video-box {
            margin-top: 20px;
            border: 4px solid #38bdf8;
            border-radius: 15px;
            display: inline-block;
            overflow: hidden;
        }

        img {
            width: 700px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            display: inline-block;
        }

        .count {
            font-size: 24px;
            color: #22c55e;
        }
    </style>
</head>

<body>

    <h1>🚀 AI Smart Surveillance System</h1>

    <div class="video-box">
        <img src="{{ url_for('video') }}">
    </div>

    <div class="card">
        <h2>👤 Person Detection Count</h2>
        <div class="count">{{ count }}</div>
    </div>

</body>
</html>
